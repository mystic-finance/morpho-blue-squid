services:
  db_flare:
    image: postgres:15
    environment:
      POSTGRES_DB: morpho_flare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresflarepassword
    ports: ["5432:5432"]
    volumes:
      - db_flare_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  processor_flare:
    build: .
    env_file: .env.flare
    environment:
      DB_HOST: db_flare
    depends_on:
      db_flare:
        condition: service_healthy
    volumes:
      - ./oracle-feeds.json:/squid/oracle-feeds.json
    command: sh -c "npx squid-typeorm-migration generate && npx squid-typeorm-migration apply && node lib/main.js"

  graphql_flare:
    build: .
    env_file: .env.flare
    environment:
      DB_HOST: db_flare
    depends_on:
      db_flare:
        condition: service_healthy
    command: npx squid-graphql-server
    ports: ["4350:4000"]

  db_plume:
    image: postgres:15
    environment:
      POSTGRES_DB: morpho_plume
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresplumepassword
    ports: ["5433:5432"]
    volumes:
      - db_plume_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  processor_plume:
    build: .
    env_file: .env.plume
    environment:
      DB_HOST: db_plume
    depends_on:
      db_plume:
        condition: service_healthy
    volumes:
      - ./oracle-feeds.json:/squid/oracle-feeds.json
    command: sh -c "npx squid-typeorm-migration generate && npx squid-typeorm-migration apply && node lib/main.js"

  graphql_plume:
    build: .
    env_file: .env.plume
    environment:
      DB_HOST: db_plume
    depends_on:
      db_plume:
        condition: service_healthy
    command: npx squid-graphql-server
    ports: ["4351:4000"]
volumes:
  db_flare_data:
  db_plume_data:
